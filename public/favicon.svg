<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fruitGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="20%" stop-color="#c040ff"/>
      <stop offset="40%" stop-color="#4080ff"/>
      <stop offset="60%" stop-color="#00ffff"/>
      <stop offset="80%" stop-color="#ffff00"/>
      <stop offset="100%" stop-color="#ff8000"/>
    </linearGradient>
  </defs>
  
  <!-- 水果主体 -->
  <ellipse cx="50" cy="58" rx="32" ry="38" fill="url(#fruitGradient)" stroke="#000" stroke-width="3"/>
  
  <!-- 水果轮廓线 -->
  <ellipse cx="50" cy="58" rx="32" ry="38" fill="none" stroke="#000" stroke-width="3"/>
  
  <!-- 右侧轮廓线 -->
  <path d="M 75 40 Q 82 58 75 76" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 左侧轮廓线 -->
  <path d="M 25 40 Q 18 58 25 76" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 茎 -->
  <rect x="46" y="16" width="8" height="12" rx="2" fill="#00c040" stroke="#000" stroke-width="2"/>
  
  <!-- 左叶子 -->
  <path d="M 48 22 Q 30 12 22 20 Q 18 28 30 32 Q 40 34 48 22" fill="#00c040" stroke="#000" stroke-width="2"/>
  <path d="M 48 22 Q 35 25 30 32" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- 右叶子 -->
  <path d="M 52 22 Q 70 12 78 20 Q 82 28 70 32 Q 60 34 52 22" fill="#00c040" stroke="#000" stroke-width="2"/>
  <path d="M 52 22 Q 65 25 70 32" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- 高光 -->
  <ellipse cx="38" cy="38" rx="6" ry="10" fill="#fff" opacity="0.4"/>
</svg>